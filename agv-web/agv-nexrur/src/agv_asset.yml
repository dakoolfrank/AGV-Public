# agv_asset.yml — AGV 资产文档索引
# 存储策略：每个资产独立 Google Shared Drive（权限隔离，可邀请外部审计师）
# 文件命名规范：{year}-{month:02d}_{来源}_{描述}.ext
# 例：2025-10_国电_义传01号站对账单.pdf

assets:

  yichuan:
    display_name: "义传新能源"
    drive_name: "义传 AGV Asset Drive"
    drive_id: "0AL2b1JHZDR_3Uk9PVA"

    # ── 公司/项目层文件（_profile） ──────────────────────────────
    profile:

      business_reg:       # 工商 / 营业执照 / 法人登记
        - seq: 1
          filename: ""    # 例：营业执照.pdf
          file_id: ""
          url: ""
          note: ""

      ownership:          # 电站权属证明 / 土地证 / 备案证
        - seq: 1
          filename: ""    # 例：电站权属证明.pdf
          file_id: ""
          url: ""
          note: ""

      major_contracts:    # 主合同（EPC总包 / O&M运维 / 融资协议）
        - seq: 1
          filename: ""    # 例：EPC总包合同.pdf
          file_id: ""
          url: ""
          note: ""

    # ── 电站层文件（stations） ───────────────────────────────────
    # station_id 命名规范：{省份缩写}_{序号} 例：gd_01 / xj_01
    # 每新增一个电站，复制 _template 块并填写 station_id / station_name
    stations:

      - station_id: ""          # 待填写，例：gd_01
        station_name: ""        # 待填写，例：广东1号电站
        capacity_mw: 0          # 装机容量（MW）
        grid_connection_date: "" # 并网日期，格式：YYYY-MM-DD
        province: ""            # 省份

        _info:                  # 电站基本信息表 / 一次性资料
          - seq: 1
            filename: ""        # 例：电站基本信息表.pdf
            file_id: ""
            url: ""
            note: ""

        contracts:              # 并网协议 / 土地租赁 / 购售电合同
          - seq: 1
            filename: ""        # 例：并网协议.pdf
            file_id: ""
            url: ""
            note: ""

        statements:             # 电网公司对账单（国电/南网），按年，文件名含月份
